<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Login - Smart Study Planner</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="login.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <!-- Left Side - Illustration -->
        <div class="login-left">
            <div class="illustration">
                <i class="fas fa-graduation-cap"></i>
                <h1>Smart Study Planner</h1>
                <p>Master your studies with intelligent planning and tracking</p>
            </div>
        </div>

        <!-- Right Side - Login Form -->
        <div class="login-right">
            <div class="login-card">
                <div class="login-header">
                    <h2>Welcome Back!</h2>
                    <p>Sign in to your study dashboard</p>
                </div>

                <form id="loginForm" class="login-form">
                    <div class="input-group">
                        <div class="input-icon">
                            <i class="fas fa-envelope"></i>
                        </div>
                        <input type="email" id="loginEmail" placeholder="Enter your email" required>
                        <label for="loginEmail">Email</label>
                    </div>

                    <div class="input-group">
                        <div class="input-icon">
                            <i class="fas fa-lock"></i>
                        </div>
                        <input type="password" id="loginPassword" placeholder="Enter your password" required>
                        <label for="loginPassword">Password</label>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox" id="rememberMe">
                            <span class="checkmark"></span>
                            Remember me
                        </label>
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>

                    <button type="submit" class="login-btn">
                        <span class="btn-text">Sign In</span>
                        <div class="btn-loader hidden">
                            <i class="fas fa-spinner fa-spin"></i>
                        </div>
                    </button>
                </form>

                <div class="divider">
                    <span>or continue with</span>
                </div>

                <div class="social-grid">
                    <button class="social-btn google" data-provider="Google">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button class="social-btn facebook" data-provider="Facebook">
                        <i class="fab fa-facebook-f"></i> Facebook
                    </button>
                </div>

                <div class="social-modal hidden" id="socialModal">
                    <div class="modal-backdrop" onclick="closeSocialModal()"></div>
                    <div class="social-modal-card">
                        <h3>Select an account</h3>
                        <p>Sign in with <strong id="socialProviderName"></strong></p>
                        <div class="modal-account-list" id="socialAccountList"></div>
                        <button class="btn btn-secondary" type="button" onclick="closeSocialModal()">Cancel</button>
                    </div>
                </div>

                <div class="signup-link">
                    <p>Don't have an account? <a href="signup.html">Create one now</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
