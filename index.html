<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Study Planner - Dashboard</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="nav.css">
    <link rel="stylesheet" href="index.css">
</head>
<body>
<div class="overlay"></div>
<div class="glow1"></div>
<div class="glow2"></div>
<div class="particles"></div>
<div class="particles"></div>
    <!-- NAVBAR -->
   <nav class="navbar">
<div class="nav-container">

<div class="logo">📚 Smart Study</div>

<!-- ✅ HAMBURGER -->
<div class="menu-toggle">
    ☰
</div>

<ul class="nav-links" id="navLinks">
    <li><a href="index.html">🏠 Home</a></li>
    <li><a href="add-task.html">➕ Add Task</a></li>
    <li><a href="tasks.html">📋 Tasks</a></li>
    <li><a href="stats.html">📊 Stats</a></li>
    <li><a href="resources.html">📖 Resources</a></li>

    <li class="logout-item">
        <button onclick="logout()" class="btn btn-danger">🚪 Logout</button>
    </li>
</ul>

</div>
</nav>
    <!-- MAIN -->

    <div class="container">
        <h1 class="page-title">Welcome to Your Study Dashboard</h1>

        <!-- STATS -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalTasks">0</div>
                <div>Total Tasks</div>
            </div>

            <div class="stat-card">
                <div class="stat-number" id="completedTasks">0</div>
                <div>Completed</div>
            </div>

            <div class="stat-card">
                <div class="stat-number" id="pendingTasks">0</div>
                <div>Pending</div>
            </div>

            <div class="stat-card">
                <div class="stat-number" id="highPriority">0</div>
                <div>High Priority</div>
            </div>
        </div>

        <!-- QUICK ACTIONS -->
        <div class="card">
            <h2>Quick Actions</h2>
            <div class="quick-grid">
                <a href="add-task.html" class="btn btn-primary">➕ Add Task</a>
                <a href="tasks.html" class="btn btn-primary">📋 Tasks</a>
                <a href="stats.html" class="btn btn-primary">📊 Stats</a>
            </div>
        </div>

<div class="card">
    <h2>Recent Tasks</h2>
    <div id="recentTasks"></div>
</div>

<!-- ✅ PUT SCRIPT HERE -->
<script>
    // 🔐 AUTH CHECK
    if (localStorage.getItem('isLoggedIn') !== 'true') {
        window.location.href = 'login.html';
    }

    function getTasks() {
        return JSON.parse(localStorage.getItem('studyTasks')) || [];
    }

    function updateStats() {
        const tasks = getTasks();

        document.getElementById('totalTasks').textContent = tasks.length;
        document.getElementById('completedTasks').textContent = tasks.filter(t => t.completed).length;
        document.getElementById('pendingTasks').textContent = tasks.filter(t => !t.completed).length;
        document.getElementById('highPriority').textContent = tasks.filter(t => t.priority === 'high').length;
    }

    function formatDate(date) {
        if (!date) return "No Date";
        return new Date(date).toLocaleDateString();
    }

    function getRecentTasks() {
        const tasks = getTasks();

        return [...tasks]
            .sort((a, b) => new Date(b.createdAt || b.dueDate) - new Date(a.createdAt || a.dueDate))
            .slice(0, 3);
    }

    function renderTasks() {
        const container = document.getElementById('recentTasks');
        const recent = getRecentTasks();

        if (recent.length === 0) {
            container.innerHTML = `<div class="empty-state">No tasks yet</div>`;
            return;
        }

        container.innerHTML = recent.map(task => `
            <div class="task-item ${task.completed ? 'completed' : ''}">
                <div>
                    <h4>${task.name}</h4>
                    <div class="task-meta">
                        ${task.priority?.toUpperCase()} • ${formatDate(task.dueDate)}
                    </div>
                </div>
                <a href="tasks.html" class="btn btn-success">View</a>
            </div>
        `).join('');
    }

    function logout() {
        localStorage.removeItem('isLoggedIn');
        localStorage.removeItem('currentUser');
        window.location.href = 'login.html';
    }
</script>
<script src="index.js"></script>
</body>
</html>
